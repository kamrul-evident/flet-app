name: Build Windows App (with Installer)

on:
  workflow_dispatch:
  push:
    branches: [feature/windows-build]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r "${{ github.workspace }}/requirements.txt"
          pip install "flet[all]"

      - name: Build Windows app
        env:
          CI: true
          FLET_BUILD_NO_PROMPTS: '1'
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: |
          cd "${{ github.workspace }}"
          flet build windows --project dataryx --org com.dataryx --product "Dataryx"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "${{ github.workspace }}/installer.iss"
        shell: powershell

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-portable
          path: ${{ github.workspace }}/build/windows/
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-installer
          path: ${{ github.workspace }}/dataryx_installer.exe
          if-no-files-found: error

